name: Release

on:
  release:
    types:
      - published
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Validate package
        run: npm run release:check

      - name: Check if version already exists on npm
        id: npm-version
        env:
          PACKAGE_NAME: session-dashboard
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          PUBLISHED_VERSION=$(npm view "$PACKAGE_NAME" version 2>/dev/null || echo "")
          echo "package_version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"
          echo "published_version=$PUBLISHED_VERSION" >> "$GITHUB_OUTPUT"

      - name: Publish package to npm
        if: steps.npm-version.outputs.package_version != steps.npm-version.outputs.published_version
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance

      - name: Skip duplicate publish
        if: steps.npm-version.outputs.package_version == steps.npm-version.outputs.published_version
        run: echo "Version ${PACKAGE_VERSION} is already published. Skipping npm publish."
        env:
          PACKAGE_VERSION: ${{ steps.npm-version.outputs.package_version }}
